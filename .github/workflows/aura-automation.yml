name: Aura-Autonomous-Cycle

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  execution:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup-Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        run: npm install

      - name: Execute
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node index.js

      - name: Sync-Logs
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Aura-Automator"
          if [[ -n "$(git status --porcelain posts_log.md)" ]]; then
            git add posts_log.md
            git commit -m "Build: Autonomous log sync - $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin main
          fi