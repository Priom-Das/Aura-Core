# @format
# Professional GitHub Actions Workflow for Project Aura
# Automates AI content generation and repository synchronization.

name: Aura-Automation-Pipeline

on:
  schedule:
    - cron: '0 0 * * *' # Executes daily at Midnight UTC
  workflow_dispatch:      # Allows manual trigger via GitHub UI

jobs:
  automation-job:
    runs-on: ubuntu-latest
    
    # Ensuring the job has necessary write permissions for GitHub Actions bot
    permissions:
      contents: write

    steps:
      # Step 1: Checkout repository using the provided Personal Access Token (PAT)
      - name: Checkout-Source-Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_GITHUB_TOKEN }}

      # Step 2: Initialize Node.js Environment
      - name: Setup-Node-Runtime
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Step 3: Install Dependencies (Handles missing lock-file gracefully)
      - name: Install-Dependencies
        run: npm install --no-package-lock

      # Step 4: Execute the Autonomous Agent Logic
      - name: Run-AI-Agent-Cycle
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: node index.js

      # Step 5: Commit and Push automated logs to the main branch
      - name: Git-Synchronize
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Prepare the log file for synchronization
          touch posts_log.md
          git add posts_log.md
          
          # Conditional logic: commit only if new data exists
          if git diff --staged --quiet; then
            echo "Pipeline: No new changes detected."
          else
            git commit -m "System: Autonomous log update [skip ci]"
            git push origin main
          fi