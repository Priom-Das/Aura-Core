# @format
# Professional CI/CD Pipeline for Aura Autonomous Agent
# Status: Production Ready | Provider: Groq & HuggingFace

name: Aura-Automation-Pipeline

on:
  schedule:
    - cron: '0 0 * * *' # Automated execution at 00:00 UTC
  workflow_dispatch:      # Manual trigger enabled

jobs:
  run-logic:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Permission to push logs back to repository

    steps:
      - name: Fetch-Source-Code
        uses: actions/checkout@v4
        with:
          # Personal Access Token for secure repository write access
          token: ${{ secrets.MY_GITHUB_TOKEN }}

      - name: Setup-Node-Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Note: No 'cache' option here to avoid 'lock file not found' error

      - name: Install-Packages
        # Using '--no-package-lock' to prevent installation errors if the lock file is missing
        run: npm install --no-package-lock

      - name: Run-AI-Engine
        env:
          # Securely injecting AI engine credentials
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: node index.js

      - name: Commit-Changes
        run: |
          # Configuring Git bot for automated commits
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Maintain operational audit log
          touch posts_log.md
          git add posts_log.md
          
          # Only push if new content has been generated
          if git diff --staged --quiet; then
            echo "Status: No changes found."
          else
            git commit -m "System: Update autonomous logs [skip ci]"
            git push origin main
          fi