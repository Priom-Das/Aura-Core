# Project Aura: Autonomous Deployment Workflow
# Version: 1.4.0 (Daily Automated Cycle)

name: Execute Autonomous Deployment

on:
  schedule:
    # Runs everyday at 08:00 UTC (Which is 02:00 PM Bangladesh Time)
    - cron: '0 8 * * *' 
  workflow_dispatch:
    # Allows you to run the agent manually from the Actions tab

jobs:
  run-aura:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Ensures full history for git push operations

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Execute Aura Agent
        run: node index.js
        env:
          # AI Engine Credentials
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

          # Social Media API Credentials
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          X_SECRET_KEY: ${{ secrets.X_SECRET_KEY }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          
          LINKEDIN_PERSON_ID: ${{ secrets.LINKEDIN_PERSON_ID }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}

          # GitHub Automation Token
          MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}