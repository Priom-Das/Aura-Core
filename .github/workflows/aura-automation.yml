# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# @file aura-automation.yml
# @description GitHub Actions workflow for autonomous AI content generation.

name: Aura Automation Pipeline

on:
  schedule:
    - cron: '0 0 * * *' # Executes daily at 00:00 UTC
  workflow_dispatch: # Enables manual execution for testing

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    # Ensures only one workflow runs at a time to prevent git conflicts
    concurrency:
      group: aura-sync
      cancel-in-progress: true

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          token: ${{secrets.MY_GITHUB_TOKEN}}

      - name: Initialize Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm install

      - name: Execute AI Generation
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: node index.js

      - name: Synchronize Logs to Repository
        run: |
          # Configure Git identity for the automated bot
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add posts_log.md
          
          # Perform commit and push only if modifications are detected
          if git diff --staged --quiet; then
            echo "No changes detected in logs."
          else
            git commit -m "System: Update autonomous logs [skip ci]"
            git push origin main
          fi