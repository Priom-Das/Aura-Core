# @format
# Professional GitHub Actions Workflow for Project Aura
# Status: Real-time trigger on push enabled for debugging and automation.

name: Aura-Automation-Pipeline

on:
  push:
    branches: [ main ]  # This ensures the workflow runs immediately after every push.
  schedule:
    - cron: '0 0 * * *' # Automated daily execution at Midnight UTC.
  workflow_dispatch:      # Allows manual trigger via the Actions tab.

jobs:
  automation-job:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Necessary for the bot to push log updates.

    steps:
      - name: Checkout-Source-Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_GITHUB_TOKEN }} # Uses your PAT for authentication.

      - name: Setup-Node-Runtime
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install-Dependencies
        run: npm install --no-package-lock # Prevents errors if lock-file is missing.

      - name: Run-AI-Agent-Cycle
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: node index.js # Executes your AI logic.

      - name: Git-Synchronize
        run: |
          # Configuring automated bot identity.
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          touch posts_log.md
          git add posts_log.md
          
          # Only commit if new content was actually generated.
          if git diff --staged --quiet; then
            echo "Status: No changes detected in the logs."
          else
            git commit -m "System: Autonomous log update [skip ci]"
            git push origin main
          fi